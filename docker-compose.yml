version: "3.9"

# ------------------------------------------------------------------
# URBAN Clothing Co — full stack
#   db      : PostgreSQL 16 with pg_trgm enabled by Flyway
#   backend : Spring Boot 3 (Java 17) REST API
#   web     : Next.js 14 (ecom-app-web/) — currently deployed as a
#             backend-less static site, so it is NOT part of the compose stack.
#             The commented block below is retained for reference in case you
#             ever want to serve it from the same host as the backend.
# ------------------------------------------------------------------
services:
  db:
    image: postgres:16-alpine
    container_name: urban-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-urban}
      POSTGRES_USER: ${POSTGRES_USER:-urban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urban_dev_pw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-urban}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urban-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-urban}
      DB_USER: ${POSTGRES_USER:-urban}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-urban_dev_pw}
      JWT_SECRET: ${JWT_SECRET:-change-me-please-use-a-strong-random-secret-of-at-least-32-bytes}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-1440}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-eparasmahajan@gmail.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-Paras@2002}
      ADMIN_MAX_COUNT: ${ADMIN_MAX_COUNT:-100}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@urban.local}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8081}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  # web:
  #   build:
  #     context: ./ecom-app-web
  #     dockerfile: Dockerfile
  #   container_name: urban-web
  #   restart: unless-stopped
  #   depends_on:
  #     - backend
  #   environment:
  #     NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
  #     NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
  #   ports:
  #     - "${WEB_PORT:-3000}:3000"

volumes:
  db_data:
