spring:
  application:
    name: urban-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/urban}
    username: ${DB_USER:urban}
    password: ${DB_PASSWORD:urban_dev_pw}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false

server:
  port: 8080
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

# -----------------------------------------------------------------
# App-specific configuration
# -----------------------------------------------------------------
app:
  jwt:
    secret: ${JWT_SECRET:change-me-use-a-strong-random-secret-of-at-least-32-bytes}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:1440}
  admin:
    # SUPER_ADMIN is seeded on first boot and can create up to `max-count` ADMINs.
    super-username: ${SUPER_ADMIN_USERNAME:eparasmahajan@gmail.com}
    super-password: ${SUPER_ADMIN_PASSWORD:Paras@2002}
    max-count: ${ADMIN_MAX_COUNT:100}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081,http://localhost:19006}
  brevo:
    api-key: ${BREVO_API_KEY:}
    mail-from: ${MAIL_FROM:no-reply@urban.local}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
  otp:
    ttl-minutes: 10
    max-attempts: 5

logging:
  level:
    root: INFO
    com.shop.app: DEBUG
    org.hibernate.SQL: WARN
